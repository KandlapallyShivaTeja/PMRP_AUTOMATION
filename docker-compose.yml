services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
      - ./hooks.py:/app/hooks.py
    environment:
      - PYTHONPATH=/app
      - AICORE_RESOURCE_GROUP=testus
      - AICORE_SERVICE_KEY={"credentials":{"clientid":"sb-b1a5fb13-c20c-403f-9266-3ed37a3f91a1!b541355|aicore!b164","clientsecret":"2e13b9c9-8d62-42fb-8904-bdbf9f8da13e$$DQ_VQiY4NWaj8Pp_0Tm1NR3RHVHV8n4WrSTMTejOAGA=","url":"https://satinfotech-us.authentication.us10.hana.ondemand.com","serviceurls":{"AI_API_URL":"https://api.ai.prod.us-east-1.aws.ml.hana.ondemand.com"}}}
    entrypoint: [ "litellm", "--config", "/app/config.yaml", "--port", "4000" ]
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-123456
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm
    restart: always

volumes:
  open-webui-data:
